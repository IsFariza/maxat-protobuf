syntax = "proto3";

package contentpb;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/IsFariza/maxat-protobuf/content-service-pb;contentpb";

service ContentService {
    rpc CreatePost(CreatePostRequest) returns (Post);
    rpc GetPost(GetPostRequest) returns (Post);
    rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
    rpc UpdatePost(UpdatePostRequest) returns (Post);
    rpc DeletePost(DeletePostRequest) returns (google.protobuf.Empty);

    rpc CreateComment(CreateCommentRequest) returns (Comment);
    rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
    rpc UpdateComment(UpdateCommentRequest) returns (Comment);
    rpc DeleteComment(DeleteCommentRequest) returns (google.protobuf.Empty);
    
    rpc ToggleLike(ToggleLikeRequest) returns (LikeResponse);
    rpc GetMyPosts(GetMyPostsRequest) returns (ListPostsResponse);
    rpc GetPostStats(GetPostStatsRequest) returns (PostStatsResponse);
}


message Post {
    string id = 1;
    string author_id = 2; 
    string content = 3;
    repeated string media_urls = 4;
    int32 like_count = 5;
    int32 comment_count = 6; 
    google.protobuf.Timestamp created_at = 7;
}

message CreatePostRequest {
    string author_id = 1;
    string content = 2;
    repeated string media_urls = 3;
}

message GetPostRequest {
    string id = 1;
}

message DeletePostRequest {
    string id = 1;
    string user_id = 2; 
}

message ListPostsRequest {
    int32 page_size = 1;
    int32 page = 2;
    string author_id = 3; 
}

message ListPostsResponse {
    repeated Post posts = 1;
    int32 total_count = 2;
}
message UpdatePostRequest {
    string id = 1;
    string user_id = 2;
    string content = 3;
    repeated string media_urls = 4;
}

message Comment {
    string id = 1;
    string post_id = 2;
    string user_id = 3;
    string text = 4;
    google.protobuf.Timestamp created_at = 5;
}

message CreateCommentRequest {
    string post_id = 1;
    string user_id = 2;
    string text = 3;
}

message ListCommentsRequest {
    string post_id = 1;
    int32 page_size = 2;
    int32 page = 3;
}

message ListCommentsResponse {
    repeated Comment comments = 1;
    int32 total_count = 2;
}
message UpdateCommentRequest {
    string id = 1;
    string user_id = 2;
    string text = 3;
}

message DeleteCommentRequest {
    string id = 1;
    string user_id = 2;
}

message ToggleLikeRequest {
    string post_id = 1;
    string user_id = 2;
}

message LikeResponse {
    int32 new_like_count = 1;
    bool is_liked = 2; 
}

message GetMyPostsRequest {
    string user_id = 1;
    int32 page_size = 2;
    int32 page = 3;
}

message GetPostStatsRequest {
    string post_id = 1;
}

message PostStatsResponse {
    string post_id = 1;
    int32 like_count = 2;
    int32 comment_count = 3;
}
