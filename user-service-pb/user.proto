syntax = "proto3";

package user;
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
option go_package = "github.com/CoffeeSi/social-network-microservices/user-service/proto/;userpb";

service UserService{
    rpc CreateUser(CreateUserRequest) returns (User);
    rpc GetUser(GetUserRequest) returns (User);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
    rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
    rpc UpdateUser(UpdateUserRequest) returns (User);
    rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
    rpc GetUserByEmail(GetUserByEmailRequest) returns (UserWithPassword);
    rpc ChangeStatus(GetUserByEmailRequest) returns (google.protobuf.Empty);
}

message CreateUserRequest {

    string first_name = 1;
    string last_name = 2;
    string email = 3;
    string password = 4;
    google.protobuf.Timestamp dob = 5;

}

message ChangePasswordRequest {
    string id = 1;
    string old_password = 2;
    string new_password = 3;
}

message User {
    string id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    google.protobuf.Timestamp dob = 5;
    google.protobuf.Timestamp created_at = 6;
    bool is_active = 7;
}
message UserWithPassword {
    string id = 1;
    string first_name = 2;
    string last_name = 3;
    string email = 4;
    google.protobuf.Timestamp dob = 5;
    google.protobuf.Timestamp created_at = 6;
    bool is_active = 7;
    string password = 8;
}
message GetUserRequest{

    string id = 1;

}

message ListUsersRequest {
    int32 page_size  = 1;
    int32 page       = 2;  
}

message DeleteUserRequest{

    string id = 1;

}

message UpdateUserRequest {
    string id = 1;
    UserUpdateData data = 2;
    google.protobuf.FieldMask update_mask = 3;
}
message UserUpdateData {
    string first_name = 1;
    string last_name = 2;
    string email = 3;
    google.protobuf.Timestamp dob = 4;
}

message ListUsersResponse {
    repeated User users       = 1;
    int32 total_count         = 2;
    int32 page                = 3;
    int32 total_pages         = 4;
}
message GetUserByEmailRequest {
    string email = 1;
}