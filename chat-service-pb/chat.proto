syntax = "proto3";
package chatpb;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/IsFariza/maxat-protobuf/chat-service-pb;chatpb";

service ChatService {
    rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
    rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
    rpc CreateGroupChat(CreateGroupChatRequest) returns (CreateGroupChatResponse);
    rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
    rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
    rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
    rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
    rpc SendReadReceipt(SendReadReceiptRequest) returns (SendReadReceiptResponse);
    rpc SendTypingStatus(SendTypingStatusRequest) returns (SendTypingStatusResponse);
    rpc AddParticipantToGroupChat(AddParticipantToGroupChatRequest) returns (AddParticipantToGroupChatResponse);
    rpc RemoveParticipantFromGroupChat(RemoveParticipantFromGroupChatRequest) returns (RemoveParticipantFromGroupChatResponse);
    rpc EditGroupChat(EditGroupChatRequest) returns (EditGroupChatResponse);
    rpc DeleteGroupChat(DeleteGroupChatRequest) returns (DeleteGroupChatResponse);
    rpc LeaveGroupChat(LeaveGroupChatRequest) returns (LeaveGroupChatResponse);
    rpc StreamMessages(StreamMessagesRequest) returns (stream StreamMessagesResponse);
}

message Chat {
    string id                            = 1;
    string name                          = 2;
    bool   is_group                      = 3;
    repeated string participant_ids      = 4;
    string creator_id                    = 5;
    google.protobuf.Timestamp created_at = 6;
    ChatMessage last_message             = 7;
}

message ChatMessage {
    string id                            = 1;
    string chat_id                       = 2;
    string sender_id                     = 3;
    string content                       = 4;
    bool   is_edited                     = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message GetChatsRequest {
}

message GetChatsResponse {
    repeated Chat chats = 1;
}

message CreateDirectChatRequest {
    string target_user_id = 1;
}

message CreateDirectChatResponse {
    Chat chat = 1;
}

message CreateGroupChatRequest {
    string name                     = 1;
    repeated string participant_ids = 2;
}

message CreateGroupChatResponse {
    Chat chat = 1;
}

message SendMessageRequest {
    string chat_id   = 1;
    string content   = 2;
}

message SendMessageResponse {
    ChatMessage message = 1;
}

message GetMessagesRequest {
    string chat_id   = 1;
    int32  page      = 2;
    int32  page_size = 3;
}

message GetMessagesResponse {
    repeated ChatMessage messages = 1;
    int32 total_count             = 2;
}

message EditMessageRequest {
    string message_id  = 1;
    string chat_id     = 2;
    string new_content = 3;
}

message EditMessageResponse {
    ChatMessage message = 1;
}

message DeleteMessageRequest {
    string message_id = 1;
    string chat_id    = 2;
}

message DeleteMessageResponse {
    string status = 1;
}

message SendReadReceiptRequest {
    string chat_id    = 1;
    string message_id = 2;
}

message SendReadReceiptResponse {
    string status = 1;
}

message SendTypingStatusRequest {
    string chat_id   = 1;
    bool   is_typing = 2;
}

message SendTypingStatusResponse {
    string status = 1;
}

message AddParticipantToGroupChatRequest {
    string chat_id = 1;
    string user_id = 2;
}

message AddParticipantToGroupChatResponse {
    string status = 1;
}

message RemoveParticipantFromGroupChatRequest {
    string chat_id = 1;
    string user_id = 2;
}

message RemoveParticipantFromGroupChatResponse {
    string status = 1;
}

message EditGroupChatRequest {
    string chat_id = 1;
    string name = 2;
}

message EditGroupChatResponse {
    string status = 1;
}

message DeleteGroupChatRequest {
    string chat_id = 1;
}

message DeleteGroupChatResponse {
    string status = 1;
}

message LeaveGroupChatRequest {
    string chat_id = 1;
}

message LeaveGroupChatResponse {
    string status = 1;
}

message StreamMessagesRequest {
    string chat_id = 1;
    string user_id = 2;
}

message StreamMessagesResponse {
    ChatMessage message = 1;
}