syntax = "proto3";
package proto;

option go_package = "github.com/CoffeeSi/social-network-microservices/auth-service/proto;authpb";

// AuthService provides authentication operations for Register and Login users
service AuthService {
    // RegisterUser registers a new user with email and password
    rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
    // LoginUser logs in a user with email and password
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
    // RefreshToken refreshes the access token using a refresh token
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
    rpc VerifyUser(VerifyUserRequest) returns (VerifyUserResponse);
}
message VerifyUserRequest {
    string email = 1;
    string code = 2;
}

message VerifyUserResponse {
    bool success = 1;
}
message RegisterUserRequest {
    string first_name = 1;
    string last_name = 2;
    string dob = 3;
    string email = 4;
    string password = 5;
}

message RegisterUserResponse {
    string message = 1;
}

message LoginUserRequest {
    string email = 1;
    string password = 2;
}

message LoginUserResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string access_token = 1;
}